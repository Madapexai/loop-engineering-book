<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" width="1200" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1f22"/>
      <stop offset="50%" style="stop-color:#1a3d2e"/>
      <stop offset="100%" style="stop-color:#0d1f22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#66bb6a"/>
      <stop offset="100%" style="stop-color:#43a047"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#66bb6a;stop-opacity:0"/>
      <stop offset="50%" style="stop-color:#66bb6a;stop-opacity:0.8"/>
      <stop offset="100%" style="stop-color:#66bb6a;stop-opacity:0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="400" fill="url(#bg)"/>

  <g opacity="0.06" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="250" x2="1200" y2="250"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="350" x2="1200" y2="350"/>
    <line x1="100" y1="0" x2="100" y2="400"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="300" y1="0" x2="300" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="500" y1="0" x2="500" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="700" y1="0" x2="700" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="900" y1="0" x2="900" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
    <line x1="1100" y1="0" x2="1100" y2="400"/>
  </g>

  <g transform="translate(900, 110)" opacity="0.2">
    <path d="M 0 180 Q 60 180 60 120 Q 60 60 120 60 Q 180 60 180 120 Q 180 180 120 180 Q 60 180 60 120" fill="none" stroke="#66bb6a" stroke-width="2.5"/>
    <path d="M 0 180 L 60 120 L 120 180 L 60 240 Z" fill="none" stroke="#66bb6a" stroke-width="2"/>
    <circle cx="60" cy="120" r="6" fill="#66bb6a"/>
  </g>

  <line x1="80" y1="120" x2="1120" y2="120" stroke="url(#lineGrad)" stroke-width="1"/>
  <line x1="80" y1="320" x2="1120" y2="320" stroke="url(#lineGrad)" stroke-width="1"/>

  <text x="80" y="185" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">
    Loop Engineering
  </text>

  <text x="80" y="230" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="500" fill="#66bb6a">
    别调Prompt了，去写Loop
  </text>

  <line x1="80" y1="260" x2="200" y2="260" stroke="url(#accent)" stroke-width="4" stroke-linecap="round"/>

  <text x="80" y="295" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="18" font-weight="400" fill="#81c784" letter-spacing="0.5">
    AI Agent 时代的软件工程新范式
  </text>

  <text x="80" y="360" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="14" font-weight="400" fill="#558b2f">
