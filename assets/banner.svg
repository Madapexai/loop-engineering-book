    <line x1="750" y1="300" x2="1100" y2="300" stroke="#00ff88" stroke-width="1"/>
  </g>
  
  <text x="60" y="150" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="48" font-weight="bold" fill="#ffffff" filter="url(#glow2)">
